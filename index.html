<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>电子塔罗</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
}

body{
background:linear-gradient(180deg,#0f0c29,#302b63,#24243e);
color:white;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* 标题 */

h1{
margin-bottom:10px;
font-size:32px;
}

p{
opacity:0.7;
margin-bottom:30px;
}

/* 洗牌按钮 */

button{
padding:12px 24px;
border:none;
border-radius:30px;
background:#8e44ff;
color:white;
font-size:16px;
cursor:pointer;
margin-bottom:30px;
}

/* 卡牌区域 */

.cards{
display:flex;
gap:30px;
perspective:1000px;
}

/* 卡牌 */

.card{
width:120px;
height:200px;
position:relative;
transform-style:preserve-3d;
transition:transform 0.8s;
cursor:pointer;
}

.card.flip{
transform:rotateY(180deg);
}

/* 卡牌面 */

.face{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
padding:10px;
}

/* 背面 */

.back{
background:linear-gradient(135deg,#6a11cb,#2575fc);
font-size:20px;
}

/* 正面 */

.front{
background:white;
color:black;
transform:rotateY(180deg);
flex-direction:column;
}

/* 解读 */

.reading{
margin-top:30px;
max-width:500px;
font-size:15px;
line-height:1.6;
opacity:0.9;
}

/* 洗牌动画 */

.shuffle{
animation:shuffle 0.6s infinite alternate;
}

@keyframes shuffle{

from{
transform:translateY(-10px) rotate(-5deg);
}

to{
transform:translateY(10px) rotate(5deg);
}

}

@media(max-width:600px){

.cards{
gap:15px;
}

.card{
width:90px;
height:150px;
}

}

</style>

</head>

<body>

<h1>🔮 塔罗占卜</h1>
<p>点击洗牌，然后翻开三张牌</p>

<button onclick="shuffle()">洗牌</button>

<div class="cards" id="cards"></div>

<div class="reading" id="reading"></div>

<script>

/* 塔罗牌数据 */

const tarot=[

{name:"愚者",meaning:"新的开始、冒险、自由精神"},
{name:"魔术师",meaning:"创造力、行动力、掌控力"},
{name:"女祭司",meaning:"直觉、神秘、潜意识"},
{name:"女皇",meaning:"丰盛、母性、创造"},
{name:"皇帝",meaning:"权威、稳定、领导"},
{name:"教皇",meaning:"传统、信仰、学习"},
{name:"恋人",meaning:"爱情、选择、关系"},
{name:"战车",meaning:"胜利、决心、前进"},
{name:"力量",meaning:"勇气、耐心、内在力量"},
{name:"隐士",meaning:"反思、寻找内心答案"},
{name:"命运之轮",meaning:"命运变化、转折"},
{name:"正义",meaning:"公平、因果、平衡"}

]

let selected=[]

const cardsDiv=document.getElementById("cards")

/* 创建卡牌 */

function createCards(){

cardsDiv.innerHTML=""

for(let i=0;i<3;i++){

let card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="face back">✨</div>
<div class="face front">
<h3>?</h3>
<p></p>
</div>

`

card.onclick=()=>flipCard(card,i)

cardsDiv.appendChild(card)

}

}

createCards()

/* 洗牌 */

function shuffle(){

selected=[...tarot]
.sort(()=>Math.random()-0.5)
.slice(0,3)

document.querySelectorAll(".card").forEach(c=>{
c.classList.add("shuffle")
c.classList.remove("flip")
})

document.getElementById("reading").innerText=""

setTimeout(()=>{

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("shuffle")
})

},1000)

}

/* 翻牌 */

function flipCard(card,index){

if(card.classList.contains("flip")) return

card.classList.add("flip")

let data=selected[index]

let front=card.querySelector(".front")

front.innerHTML=`

<h3>${data.name}</h3>
<p>${data.meaning}</p>

`

showReading()

}

/* 显示解读 */

function showReading(){

let flipped=[...document.querySelectorAll(".card.flip")]

if(flipped.length===3){

let text=`
过去：${selected[0].name} — ${selected[0].meaning}
\n现在：${selected[1].name} — ${selected[1].meaning}
\n未来：${selected[2].name} — ${selected[2].meaning}
`

document.getElementById("reading").innerText=text

}

}

</script>

</body>
</html>
