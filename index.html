<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航站</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:#f5f7fb;
color:#333;
display:flex;
}

/* ===== Sidebar ===== */

.sidebar{
width:230px;
background:white;
height:100vh;
position:sticky;
top:0;
padding:25px 15px;
box-shadow:0 0 10px rgba(0,0,0,0.05);
transition:0.3s;
}

.logo{
font-size:20px;
font-weight:bold;
margin-bottom:25px;
}

.nav a{
display:block;
padding:10px 15px;
margin-bottom:6px;
border-radius:8px;
text-decoration:none;
color:#555;
transition:0.2s;
}

.nav a:hover{
background:#f0f3ff;
color:#4a6cf7;
}

.nav a.active{
background:#4a6cf7;
color:white;
}

/* ===== Content ===== */

.content{
flex:1;
padding:30px 40px;
}

/* ===== Search ===== */

.search-bar{
display:flex;
gap:10px;
margin-bottom:35px;
align-items:center;
}

.engine{
padding:8px 10px;
border-radius:6px;
border:1px solid #ddd;
background:white;
}

.search-input{
flex:1;
padding:10px 12px;
border-radius:6px;
border:1px solid #ddd;
outline:none;
}

.search-btn{
padding:10px 16px;
background:#4a6cf7;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

/* ===== Section ===== */

.section{
margin-bottom:60px;
}

.section-title{
font-size:24px;
font-weight:600;
margin-bottom:15px;
}

/* ===== Tabs ===== */

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab{
padding:6px 12px;
border-radius:6px;
cursor:pointer;
background:#eef1ff;
}

.tab.active{
background:#4a6cf7;
color:white;
}

/* ===== Cards ===== */

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:18px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
display:flex;
gap:12px;
cursor:pointer;
transition:0.25s;
text-decoration:none;
color:inherit;
box-shadow:0 2px 6px rgba(0,0,0,0.04);
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card i{
font-size:22px;
color:#4a6cf7;
width:26px;
}

.card-title{
font-weight:600;
}

.card-desc{
font-size:13px;
color:#777;
margin-top:4px;
}

/* ===== Hamburger ===== */

.hamburger{
display:none;
font-size:22px;
cursor:pointer;
margin-bottom:15px;
}

/* ===== Responsive ===== */

@media(max-width:900px){

body{
flex-direction:column;
}

.sidebar{
position:fixed;
left:-260px;
z-index:1000;
}

.sidebar.show{
left:0;
}

.content{
padding:20px;
}

.hamburger{
display:block;
}

}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">

<div class="logo">导航站</div>

<div class="nav">
<a href="#dev">开发工具</a>
<a href="#design">设计资源</a>
<a href="#learn">学习平台</a>
</div>

</div>

<div class="content">

<div class="hamburger" id="menuBtn">
<i class="fa fa-bars"></i>
</div>

<!-- 搜索 -->
<div class="search-bar">

<select class="engine" id="engine">
<option value="https://www.baidu.com/s?wd=">百度</option>
<option value="https://www.google.com/search?q=">Google</option>
<option value="https://www.bing.com/search?q=">Bing</option>
</select>

<input class="search-input" id="searchInput" placeholder="搜索内容">

<button class="search-btn" onclick="search()">搜索</button>

</div>

<!-- 开发 -->
<section class="section" id="dev">

<div class="section-title">开发工具</div>

<div class="tabs">
<div class="tab active" data-tab="dev1">常用</div>
<div class="tab" data-tab="dev2">AI</div>
</div>

<div class="cards tab-content" id="dev1">

<a class="card" href="https://github.com" target="_blank">
<i class="fab fa-github"></i>
<div>
<div class="card-title">GitHub</div>
<div class="card-desc">全球最大代码托管平台</div>
</div>
</a>

<a class="card" href="https://codepen.io" target="_blank">
<i class="fa fa-code"></i>
<div>
<div class="card-title">CodePen</div>
<div class="card-desc">前端在线代码实验场</div>
</div>
</a>

</div>

<div class="cards tab-content" id="dev2" style="display:none">

<a class="card" href="https://chat.openai.com" target="_blank">
<i class="fa fa-robot"></i>
<div>
<div class="card-title">ChatGPT</div>
<div class="card-desc">AI 编程助手</div>
</div>
</a>

<a class="card" href="https://cursor.sh" target="_blank">
<i class="fa fa-terminal"></i>
<div>
<div class="card-title">Cursor</div>
<div class="card-desc">AI IDE 编辑器</div>
</div>
</a>

</div>

</section>

<!-- 设计 -->
<section class="section" id="design">

<div class="section-title">设计资源</div>

<div class="tabs">
<div class="tab active" data-tab="design1">图标</div>
<div class="tab" data-tab="design2">图片</div>
</div>

<div class="cards tab-content" id="design1">

<a class="card" href="https://fontawesome.com" target="_blank">
<i class="fa fa-icons"></i>
<div>
<div class="card-title">FontAwesome</div>
<div class="card-desc">流行图标库</div>
</div>
</a>

</div>

<div class="cards tab-content" id="design2" style="display:none">

<a class="card" href="https://unsplash.com" target="_blank">
<i class="fa fa-image"></i>
<div>
<div class="card-title">Unsplash</div>
<div class="card-desc">免费高清图片</div>
</div>
</a>

</div>

</section>

<!-- 学习 -->
<section class="section" id="learn">

<div class="section-title">学习平台</div>

<div class="tabs">
<div class="tab active" data-tab="learn1">编程</div>
</div>

<div class="cards tab-content" id="learn1">

<a class="card" href="https://developer.mozilla.org" target="_blank">
<i class="fa fa-book"></i>
<div>
<div class="card-title">MDN</div>
<div class="card-desc">Web开发权威文档</div>
</div>
</a>

</div>

</section>

</div>

<script>

/* ===== 搜索 ===== */

function search(){

let engine=document.getElementById("engine").value
let q=document.getElementById("searchInput").value

if(q){
window.open(engine+encodeURIComponent(q))
}

}

/* ===== Tabs ===== */

document.querySelectorAll(".tab").forEach(tab=>{

tab.onclick=()=>{

let parent=tab.parentElement.parentElement

parent.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
tab.classList.add("active")

parent.querySelectorAll(".tab-content").forEach(c=>c.style.display="none")

document.getElementById(tab.dataset.tab).style.display="grid"

}

})

/* ===== Sidebar Toggle ===== */

const sidebar=document.getElementById("sidebar")

document.getElementById("menuBtn").onclick=()=>{

sidebar.classList.toggle("show")

}

/* ===== Scroll Spy ===== */

const sections=document.querySelectorAll(".section")
const navLinks=document.querySelectorAll(".nav a")

window.addEventListener("scroll",()=>{

let current=""

sections.forEach(section=>{

const top=section.offsetTop-120

if(scrollY>=top){
current=section.getAttribute("id")
}

})

navLinks.forEach(link=>{

link.classList.remove("active")

if(link.getAttribute("href")==="#"+current){
link.classList.add("active")
}

})

})

/* ===== Smooth Scroll ===== */

navLinks.forEach(link=>{

link.addEventListener("click",function(e){

e.preventDefault()

let target=document.querySelector(this.getAttribute("href"))

target.scrollIntoView({
behavior:"smooth"
})

})

})

</script>

</body>
</html>
